<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.11.0/axios.min.js"
    integrity="sha512-h9644v03pHqrIHThkvXhB2PJ8zf5E9IyVnrSfZg8Yj8k4RsO4zldcQc4Bi9iVLUCCsqNY0b4WXVV4UB+wbWENA=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <title>Admin - Phone Store</title>
</head>
<body class="bg-slate-100 min-h-screen">
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold text-slate-800">Admin Product Management</h1>
      <a href="index.html" class="text-sm font-medium text-blue-600 hover:underline">Qua trang người dùng</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
    <section class="lg:col-span-1 bg-white rounded-xl shadow-sm border p-5">
      <h2 class="text-lg font-semibold text-slate-800 mb-4">Form sản phẩm</h2>
      <form id="productForm" class="space-y-3">
        <input id="name" type="text" placeholder="Tên sản phẩm" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <input id="price" type="number" min="0" placeholder="Giá" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <input id="img" type="text" placeholder="Link ảnh" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <input id="screen" type="text" placeholder="Màn hình" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <input id="backCamera" type="text" placeholder="Camera sau" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <input id="frontCamera" type="text" placeholder="Camera trước" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <input id="desc" type="text" placeholder="Mô tả" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
        <select id="type" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-blue-200">
          <option value="">Chọn loại</option>
          <option value="iphone">iPhone</option>
          <option value="Samsung">Samsung</option>
        </select>
        <div class="flex gap-2 pt-2">
          <button type="submit" id="btnSave" class="flex-1 bg-blue-600 text-white rounded-lg py-2 hover:bg-blue-700">Tạo mới</button>
          <button type="button" id="btnUpdate" class="flex-1 bg-amber-500 text-white rounded-lg py-2 hover:bg-amber-600 hidden">Cập nhật</button>
          <button type="button" id="btnReset" class="px-4 bg-slate-200 rounded-lg py-2 hover:bg-slate-300">Reset</button>
        </div>
      </form>
      <p id="message" class="mt-3 text-sm"></p>
    </section>

    <section class="lg:col-span-2 bg-white rounded-xl shadow-sm border p-5">
      <div class="flex flex-col sm:flex-row gap-3 justify-between mb-4">
        <h2 class="text-lg font-semibold text-slate-800">Danh sách sản phẩm</h2>
        <div class="flex gap-2">
          <input id="keyword" type="search" placeholder="Tìm theo tên..." class="border rounded-lg px-3 py-2 w-56 outline-none focus:ring-2 focus:ring-blue-200">
          <button id="btnSearch" class="bg-slate-800 text-white px-4 py-2 rounded-lg hover:bg-slate-900">Tìm</button>
        </div>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b text-slate-600">
              <th class="text-left py-2">ID</th>
              <th class="text-left py-2">Tên</th>
              <th class="text-left py-2">Giá</th>
              <th class="text-left py-2">Loại</th>
              <th class="text-left py-2">Hành động</th>
            </tr>
          </thead>
          <tbody id="productTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="./js/admin.js"></script>
</body>
</html>
