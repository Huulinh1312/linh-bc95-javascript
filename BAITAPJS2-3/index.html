<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Cơ Bản - 5 Bài Tập</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  
  <body class="bg-gray-100 p-8">
    <div class="mx-auto max-w-3xl bg-white rounded-xl shadow-lg p-8">
      <h1 class="text-center text-blue-600 text-3xl font-bold mb-8 uppercase">Bài Tập JavaScript - Buổi 2 và 3</h1>

      <div class="space-y-8">
        <!-- BÀI 1: Tính tiền lương nhân viên -->
        <div class="bg-blue-50 p-6 rounded-lg border border-blue-200">
          <h2 class="font-bold text-blue-700 text-xl mb-4">Bài 1: Tính tiền lương nhân viên</h2>
          <div class="space-y-3">
            <p class="text-sm text-gray-600 italic">Lương 1 ngày mặc định: 100.000đ</p>
            <input type="number" id="input-days" placeholder="Nhập số ngày làm" class="w-full border border-gray-300 rounded-lg p-3 outline-blue-500" />
            <button id="btn-salary" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition">Tính Lương</button>
            <p id="result-salary" class="mt-4 p-3 bg-white border border-blue-200 text-blue-800 font-semibold rounded-lg min-h-[50px] flex items-center"></p>
          </div>
        </div>
        <!-- Bài 2: Tính giá trị trung bình   -->
        <div class="bg-green-50 p-6 rounded-lg border border-green-200">
          <h2 class="font-bold text-green-700 text-xl mb-4">Bài 2: Tính giá trị trung bình</h2>
          <div class="grid grid-cols-5 gap-2 mb-3">
            <input type="number" id="num1" placeholder="Số 1" class="border border-gray-300 rounded p-2 outline-green-500" />
            <input type="number" id="num2" placeholder="Số 2" class="border border-gray-300 rounded p-2 outline-green-500" />
            <input type="number" id="num3" placeholder="Số 3" class="border border-gray-300 rounded p-2 outline-green-500" />
            <input type="number" id="num4" placeholder="Số 4" class="border border-gray-300 rounded p-2 outline-green-500" />
            <input type="number" id="num5" placeholder="Số 5" class="border border-gray-300 rounded p-2 outline-green-500" />
          </div>
          <button id="btn-average" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg transition">Tính Trung Bình</button>
          <p id="result-average" class="mt-4 p-3 bg-white border border-green-200 text-green-800 font-semibold rounded-lg min-h-[50px] flex items-center"></p>
        </div>
        <!-- Bài 3: Quy đối tiền -->
        <div class="bg-yellow-50 p-6 rounded-lg border border-yellow-200">
          <h2 class="font-bold text-yellow-700 text-xl mb-4">Bài 3: Quy đổi tiền (USD -> VND)</h2>
          <div class="space-y-3">
            <p class="text-sm text-gray-600 italic">Tỷ giá mặc định: 23.500 VND/USD</p>
            <input type="number" id="input-usd" placeholder="Nhập số tiền USD" class="w-full border border-gray-300 rounded-lg p-3 outline-yellow-500" />
            <button id="btn-convert" class="bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-2 px-6 rounded-lg transition">Quy Đổi</button>
            <p id="result-convert" class="mt-4 p-3 bg-white border border-yellow-200 text-yellow-800 font-semibold rounded-lg min-h-[50px] flex items-center"></p>
          </div>
        </div>
        <!-- Bài 4: Chu vi và diện tích HCN -->
        <div class="bg-purple-50 p-6 rounded-lg border border-purple-200">
          <h2 class="font-bold text-purple-700 text-xl mb-4">Bài 4: Chu vi & Diện tích HCN</h2>
          <div class="grid grid-cols-2 gap-4 mb-3">
            <div>
              <label class="block text-sm mb-1">Chiều dài:</label>
              <input type="number" id="rect-length" class="w-full border border-gray-300 rounded p-3 outline-purple-500" />
            </div>
            <div>
              <label class="block text-sm mb-1">Chiều rộng:</label>
              <input type="number" id="rect-width" class="w-full border border-gray-300 rounded p-3 outline-purple-500" />
            </div>
          </div>
          <button id="btn-rect" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-lg transition">Tính Kết Quả</button>
          <p id="result-rect" class="mt-4 p-3 bg-white border border-purple-200 text-purple-800 font-semibold rounded-lg min-h-[50px] flex items-center"></p>
        </div>
        <!-- Bài 5 Tính tổng 2 ký số -->
        <div class="bg-red-50 p-6 rounded-lg border border-red-200">
          <h2 class="font-bold text-red-700 text-xl mb-4">Bài 5: Tính tổng 2 ký số</h2>
          <div class="space-y-3">
            <input type="number" id="input-number" placeholder="Nhập số có 2 chữ số (VD: 12, 45...)" class="w-full border border-gray-300 rounded-lg p-3 outline-red-500" />
            <button id="btn-sum-digits" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition">Tính Tổng</button>
            <p id="result-sum-digits" class="mt-4 p-3 bg-white border border-red-200 text-red-800 font-semibold rounded-lg min-h-[50px] flex items-center"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
