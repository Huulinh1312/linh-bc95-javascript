<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTVN Buổi 5 - Hữu Linh (100Đ)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-white">
    <main class="py-10 px-4 max-w-2xl mx-auto space-y-10">
        
        <h1 class="text-3xl font-bold text-center mb-5">Bài 1: Tính điểm tuyển sinh</h1>
        <section class="bg-gray-100 rounded-lg shadow-lg p-6">
            <form id="formXetTuyen" class="space-y-4">
                <div>
                    <label class="block font-medium mb-1">Điểm chuẩn</label>
                    <input id="diemChuan" type="number" step="0.01" class="w-full border rounded-sm px-3 py-2" placeholder="Mời nhập điểm chuẩn" required>
                    <p id="errorDiemChuan" class="hidden text-red-400"></p>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block font-medium mb-1 text-sm">Điểm môn 1</label>
                        <input id="diemMon1" type="number" step="0.01" class="w-full border rounded-sm px-3 py-2" placeholder="Nhập điểm" required>
                        <p id="errorDiemMon1" class="hidden text-red-400"></p>
                    </div>
                    <div>
                        <label class="block font-medium mb-1 text-sm">Điểm môn 2</label>
                        <input id="diemMon2" type="number" step="0.01" class="w-full border rounded-sm px-3 py-2" placeholder="Nhập điểm" required>
                        <p id="errorDiemMon2" class="hidden text-red-400"></p>
                    </div>
                    <div>
                        <label class="block font-medium mb-1 text-sm">Điểm môn 3</label>
                        <input id="diemMon3" type="number" step="0.01" class="w-full border rounded-sm px-3 py-2" placeholder="Nhập điểm" required>
                        <p id="errorDiemMon3" class="hidden text-red-400"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-medium mb-1">Khu vực</label>
                        <select id="khuVuc" class="w-full border rounded-sm px-3 py-2" required>
                            <option value="X">Chọn khu vực (X)</option>
                            <option value="A">Khu vực A</option>
                            <option value="B">Khu vực B</option>
                            <option value="C">Khu vực C</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-medium mb-1">Đối tượng</label>
                        <select id="doiTuong" class="w-full border rounded-sm px-3 py-2" required>
                            <option value="0">Chọn đối tượng (0)</option>
                            <option value="1">Đối tượng 1</option>
                            <option value="2">Đối tượng 2</option>
                            <option value="3">Đối tượng 3</option>
                        </select>
                    </div>
                </div>

                <button id="btnTinhDiem" type="submit" class="bg-green-400 hover:bg-green-500 rounded-md px-3 py-2 transition">
                    Tính điểm trung bình
                </button>
            </form>
            <p id="resultTuyenSinh" class="hidden mt-4 p-3 bg-white border rounded font-bold"></p>
        </section>

        <h1 class="text-3xl font-bold text-center mb-5">Bài 2: Tính Tiền Điện</h1>
        <section class="bg-gray-100 rounded-lg shadow-lg p-6">
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-medium mb-1">Họ tên</label>
                        <input id="tenChuHo" type="text" class="w-full border rounded-sm px-3 py-2" placeholder="Nhập họ tên">
                    </div>
                    <div>
                        <label class="block font-medium mb-1">Số Kw tiêu thụ</label>
                        <input id="soKw" type="number" class="w-full border rounded-sm px-3 py-2" placeholder="Nhập số Kw">
                    </div>
                </div>
                <button id="btnTienDien" class="bg-yellow-400 hover:bg-yellow-500 rounded-md px-3 py-2 transition">
                    Tính tiền điện
                </button>
                <p id="resultTienDien" class="hidden mt-4 p-3 bg-white border rounded font-bold"></p>
            </div>
        </section>

        <h1 class="text-3xl font-bold text-center mb-5">Bài 3: Thuế Thu Nhập Cá Nhân</h1>
        <section class="bg-gray-100 rounded-lg shadow-lg p-6">
            <div class="space-y-4">
                <div class="grid grid-cols-3 gap-4">
                    <div class="col-span-1">
                        <label class="block font-medium mb-1 text-sm">Họ tên</label>
                        <input id="hoTen" type="text" class="w-full border rounded-sm px-3 py-2" placeholder="Họ tên">
                    </div>
                    <div>
                        <label class="block font-medium mb-1 text-sm">Thu nhập (triệu)</label>
                        <input id="tongThuNhap" type="number" class="w-full border rounded-sm px-3 py-2" placeholder="Thu nhập">
                    </div>
                    <div>
                        <label class="block font-medium mb-1 text-sm">Số người PT</label>
                        <input id="soNguoiPhuThuoc" type="number" class="w-full border rounded-sm px-3 py-2" placeholder="Số người">
                    </div>
                </div>
                <button id="btnThue" class="bg-red-400 hover:bg-red-500 text-white rounded-md px-3 py-2 transition">
                    Tính tiền thuế
                </button>
                <p id="resultThue" class="hidden mt-4 p-3 bg-white border rounded font-bold"></p>
            </div>
        </section>

        <h1 class="text-3xl font-bold text-center mb-5">Bài 4: Tính Tiền Cáp</h1>
        <section class="bg-gray-100 rounded-lg shadow-lg p-6">
            <form id="formHoaDon" class="space-y-4">
                <div>
                    <label class="block font-medium mb-1">Mã khách hàng</label>
                    <input type="text" id="maKH" class="w-full border rounded px-3 py-2" placeholder="Mời bạn nhập mã khách hàng" required>
                    <p id="errorMaKH" class="hidden text-red-400"></p>
                </div>
                <div>
                    <label class="block font-medium mb-1">Loại khách hàng</label>
                    <select id="loaiKH" class="w-full border rounded px-3 py-2">
                        <option value="">--Chọn loại khách hàng--</option>
                        <option value="nhaDan">Nhà dân</option>
                        <option value="doanhNghiep">Doanh nghiệp</option>
                    </select>
                    <p id="errorLoaiKH" class="hidden text-red-400"></p>
                </div>

                <div id="wrapKetNoi" class="hidden">
                    <label class="block font-medium mb-1">Số kết nối</label>
                    <input type="number" id="soKetNoi" min="1" class="w-full border rounded px-3 py-2" placeholder="Nhập số kết nối">
                    <p id="errorSoKetNoi" class="hidden text-red-400"></p>
                </div>

                <div>
                    <label class="block font-medium mb-1">Số kênh cao cấp</label>
                    <input type="number" id="soKenhCaoCap" class="w-full border rounded px-3 py-2" min="0" placeholder="Nhập số kênh cao cấp">
                    <p id="errorSoKenhCaoCap" class="hidden text-red-400"></p>
                </div>

                <button type="submit" class="w-full bg-blue-500 rounded-md text-white px-4 py-2 hover:bg-blue-600 transition">
                    Tính tiền cáp
                </button>
            </form>
            <p id="resultHoaDon" class="hidden mt-4 p-3 bg-white border rounded font-bold"></p>
        </section>

    </main>

    <script src="js/bai1.js"></script>
    <script src="js/bai2.js"></script>
    <script src="js/bai3.js"></script>
    <script src="js/bai4.js"></script>
</body>

</html>
