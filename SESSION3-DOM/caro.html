<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Caro - Minimax AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }

        .cell {
            width: 38px;
            height: 38px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            font-weight: 800;
            transition: all 0.15s ease;
            user-select: none;
            background: rgba(255, 255, 255, 0.03);
        }
        .cell:hover { background: rgba(99, 102, 241, 0.15); }
        .cell.x { color: #60a5fa; text-shadow: 0 0 8px rgba(96, 165, 250, 0.4); }
        .cell.o { color: #f87171; text-shadow: 0 0 8px rgba(248, 113, 113, 0.4); }
        .cell.win {
            background: rgba(250, 204, 21, 0.2);
            animation: pulse-win 0.8s ease infinite alternate;
        }
        .cell.last-move { box-shadow: inset 0 0 0 2px #a78bfa; }

        @keyframes pulse-win {
            from { background: rgba(250, 204, 21, 0.15); }
            to { background: rgba(250, 204, 21, 0.35); }
        }

        @keyframes thinking-dot {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
        .dot1 { animation: thinking-dot 1.4s infinite 0s; }
        .dot2 { animation: thinking-dot 1.4s infinite 0.2s; }
        .dot3 { animation: thinking-dot 1.4s infinite 0.4s; }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass rounded-3xl shadow-2xl p-8 max-w-fit">

        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-white tracking-tight">
                <span class="text-blue-400">C</span><span class="text-red-400">A</span><span class="text-yellow-400">R</span><span class="text-green-400">O</span>
            </h1>
            <p class="text-xs text-slate-500 mt-1 tracking-widest uppercase">Minimax &middot; Alpha-Beta Pruning</p>
        </div>

        <!-- Scoreboard -->
        <div class="flex items-center justify-between mb-5 gap-3">
            <div class="flex items-center gap-3 glass rounded-xl px-4 py-2.5">
                <div class="w-9 h-9 rounded-lg bg-blue-500/20 flex items-center justify-center">
                    <span class="text-blue-400 font-extrabold text-lg">X</span>
                </div>
                <div>
                    <p class="text-[10px] text-slate-500 uppercase tracking-wider">Bạn</p>
                    <p id="score-x" class="text-white font-bold text-sm">0 thắng</p>
                </div>
            </div>

            <div id="status" class="px-5 py-2 rounded-full text-sm font-semibold bg-slate-800 text-slate-300 border border-slate-700 min-w-[160px] text-center">
                Lượt của bạn
            </div>

            <div class="flex items-center gap-3 glass rounded-xl px-4 py-2.5">
                <div>
                    <p class="text-[10px] text-slate-500 uppercase tracking-wider text-right">AI</p>
                    <p id="score-o" class="text-white font-bold text-sm text-right">0 thắng</p>
                </div>
                <div class="w-9 h-9 rounded-lg bg-red-500/20 flex items-center justify-center">
                    <span class="text-red-400 font-extrabold text-lg">O</span>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex gap-3 mb-5 items-center justify-center">
            <select id="board-size" class="glass text-slate-300 text-xs rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                <option value="10" class="bg-slate-800">10 × 10</option>
                <option value="12" class="bg-slate-800">12 × 12</option>
                <option value="15" class="bg-slate-800">15 × 15</option>
            </select>

            <select id="difficulty" class="glass text-slate-300 text-xs rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500 cursor-pointer">
                <option value="1" class="bg-slate-800">Dễ</option>
                <option value="2" class="bg-slate-800">Trung bình</option>
                <option value="3" selected class="bg-slate-800">Khó</option>
            </select>

            <button id="btn-reset" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-lg text-xs font-semibold cursor-pointer transition-all hover:shadow-lg hover:shadow-indigo-500/25 active:scale-95">
                Ván mới
            </button>
        </div>

        <!-- Board -->
        <div class="flex justify-center">
            <div id="board" class="inline-grid rounded-xl overflow-hidden border border-slate-700/50 shadow-xl"></div>
        </div>

        <!-- Thinking indicator -->
        <div id="thinking" class="hidden mt-4 text-center">
            <span class="text-purple-400 text-sm font-medium">
                AI đang suy nghĩ
                <span class="dot1">.</span><span class="dot2">.</span><span class="dot3">.</span>
            </span>
        </div>
    </div>

    <script src="js/caro-minimax.js"></script>
</body>
</html>
